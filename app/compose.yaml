version: "3.9"

services:
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: constellation-recognizer-api
    ports:
      - "9002:9000"
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    # 🚨 CRITICAL FIX: CUDA-enabled image
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # NVIDIA GPU binding
      - NVIDIA_VISIBLE_DEVICES=0
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

      # Ollama GPU enforcement
      - OLLAMA_NUM_GPU=1
      - OLLAMA_GPU_OVERHEAD=0
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_KEEP_ALIVE=24h
    runtime: nvidia
    restart: unless-stopped

volumes:
  ollama_data:
